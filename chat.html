<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RunP8 Chat</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f3f5f9;
      color:#0f172a;
    }

    .app{
      max-width:520px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background:#f3f5f9;
    }

    .topbar{
      padding:18px 16px 10px;
      background:#f3f5f9;
      border-bottom:1px solid #e5e7eb;
      position:sticky;
      top:0;
      z-index:10;
    }

    .brand{
      font-size:22px;
      font-weight:700;
      margin:0;
    }

    .sub{
      margin:4px 0 0;
      font-size:14px;
      color:#6b7280;
    }

    .chat-wrap{
      flex:1;
      padding:18px 14px 110px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .bubble{
      max-width:85%;
      padding:14px 16px;
      border-radius:18px;
      line-height:1.45;
      font-size:16px;
      word-wrap:break-word;
    }

    .bubble.bot{
      background:#ffffff;
      color:#0f172a;
      border:1px solid #e5e7eb;
      align-self:flex-start;
      border-bottom-left-radius:6px;
    }

    .bubble.user{
      background:#2563eb;
      color:#ffffff;
      align-self:flex-end;
      border-bottom-right-radius:6px;
    }

    .composer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#ffffff;
      border-top:1px solid #e5e7eb;
      padding:12px;
    }

    .composer-inner{
      max-width:520px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .input{
      flex:1;
      border:1px solid #dbe2ea;
      border-radius:999px;
      padding:14px 16px;
      font-size:16px;
      outline:none;
    }

    .send-btn{
      border:none;
      background:#2563eb;
      color:#ffffff;
      border-radius:999px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1 class="brand">RunP8</h1>
      <p class="sub">Helping you find a place, simply</p>
    </div>

    <div class="chat-wrap" id="chatWrap"></div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <input id="chatInput" class="input" type="text" placeholder="Type a message..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const API = "https://polished-scene-97a2.infomomtelo.workers.dev";

    const params = new URLSearchParams(window.location.search);
    const property = params.get("property") || "";
    const price = params.get("price") || "";
    const location = params.get("location") || "";

    const chatWrap = document.getElementById("chatWrap");
    const chatInput = document.getElementById("chatInput");

    let initialSent = false;

    const conversation_id =
      "conv_" +
      (property || "general").replace(/\s+/g, "_").toLowerCase() +
      "_" +
      (price || "0") +
      "_" +
      (location || "unknown").replace(/\s+/g, "_").toLowerCase();

    function renderBubble(text, senderRole) {
      const div = document.createElement("div");
      div.className = "bubble " + (senderRole === "me" ? "user" : "bot");
      div.textContent = text;
      chatWrap.appendChild(div);
    }

    async function loadMessages() {
      const res = await fetch(`${API}/messages?conversation_id=${conversation_id}`);
      const data = await res.json();

      chatWrap.innerHTML = "";

      if (property && !initialSent && data.length === 0) {
        initialSent = true;

        await fetch(`${API}/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id,
            sender: "me",
            text:
              "Hi, I’m interested in the " +
              property +
              " in " +
              location +
              " for $" +
              price +
              "."
          })
        });

        return loadMessages();
      }

      data.forEach(m => {
        renderBubble(m.message_text, m.sender_role);
      });

      chatWrap.scrollTop = chatWrap.scrollHeight;
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      await fetch(`${API}/message`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          conversation_id,
          sender: "me",
          text
        })
      });

      chatInput.value = "";
      loadMessages();
    }

    chatInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

    setInterval(loadMessages, 2000);
    loadMessages();
  </script>
</body>
</html>
