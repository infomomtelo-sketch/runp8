<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 Chat</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

.chat {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.messages {
  height: 70vh;
  overflow-y: auto;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.me {
  background: #2563eb;
  color: white;
  margin-left: auto;
}

.other {
  background: #e5e7eb;
}

.input {
  display: flex;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="chat">
  <h3>RunP8 Chat</h3>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="text" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const API = "https://polished-scene-97a2.infomomtelo.workers.dev";

// GET URL PARAMS
const params = new URLSearchParams(window.location.search);
const property = params.get("property") || "general";
const price = params.get("price") || "0";
const location = params.get("location") || "unknown";

// CREATE UNIQUE CONVERSATION ID
const conversation_id =
  "conv_" +
  property.replace(/\s+/g, "_").toLowerCase() +
  "_" +
  price +
  "_" +
  location.replace(/\s+/g, "_").toLowerCase();

async function load() {
  const res = await fetch(`${API}/messages?conversation_id=${conversation_id}`);
  const data = await res.json();

  const box = document.getElementById("messages");
  box.innerHTML = "";

  // FIRST MESSAGE (IMPORTANT)
  if (property && data.length === 0) {
    const starter = document.createElement("div");
    starter.className = "msg other";
    starter.innerText =
      "Hi, I’m interested in the " +
      property +
      " in " +
      location +
      " for $" +
      price + ".";
    box.appendChild(starter);
  }

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.sender === "me" ? "me" : "other");
    div.innerText = m.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

async function send() {
  const text = document.getElementById("text").value;

  if (!text) return;

  await fetch(`${API}/message`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      conversation_id,
      sender: "me",
      text
    })
  });

  document.getElementById("text").value = "";
  load();
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
