<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Schedule showing</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:800px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  position:relative;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.menu-btn{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:#142133;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.title{
  font-size:28px;
  margin-bottom:16px;
}

.field{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  margin-bottom:12px;
  font-size:14px;
  box-sizing:border-box;
}

.grid{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.choice{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  background:#f8fafc;
  cursor:pointer;
  user-select:none;
}

.choice.active{
  background:#2563eb;
  color:white;
  border-color:#2563eb;
}

.actions{
  margin-top:14px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:#2563eb;
  color:white;
}

.note{
  margin-top:12px;
  color:#6b7280;
  font-size:13px;
  line-height:1.5;
}

/* cabinet */
#cabinet{
  position:fixed;
  top:0;
  right:-280px;
  width:280px;
  height:100%;
  background:white;
  box-shadow:-4px 0 20px rgba(0,0,0,0.12);
  padding:20px;
  transition:0.3s ease;
  z-index:999;
  box-sizing:border-box;
}

#cabinet h3{
  margin-top:0;
  margin-bottom:18px;
}

#cabinet a{
  display:block;
  text-decoration:none;
  color:#142133;
  font-weight:600;
  padding:10px 0;
  border-bottom:1px solid #eef2f7;
}

#cabinetClose{
  margin-bottom:16px;
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
  color:#142133;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <a href="rental/index.html" class="back">← Back</a>
    <div>RunP8</div>
    <button type="button" class="menu-btn" onclick="toggleCabinet()">☰</button>
  </div>

  <form action="https://formspree.io/f/xreynqkp" method="POST" class="card" onsubmit="return beforeSubmitShowing()">

    <div class="title">Schedule showing</div>

    <input name="name" id="name" class="field" placeholder="Full name" required>
    <input name="phone" id="phone" class="field" placeholder="Phone">
    <input name="email" id="email" class="field" placeholder="Email">

    <input type="hidden" name="selected_day" id="selectedDayInput">
    <input type="hidden" name="selected_time" id="selectedTimeInput">
    <input type="hidden" name="form_type" value="showing_request">

    <div style="margin-bottom:8px;font-weight:600;">Select day</div>
    <div class="grid" id="days">
      <div class="choice" onclick="selectDay(this,'Friday')">Friday</div>
      <div class="choice" onclick="selectDay(this,'Saturday')">Saturday</div>
      <div class="choice" onclick="selectDay(this,'Sunday')">Sunday</div>
    </div>

    <div style="margin:14px 0 8px;font-weight:600;">Select time</div>
    <div class="grid" id="times">
      <div class="choice" onclick="selectTime(this,'10:00 AM')">10:00 AM</div>
      <div class="choice" onclick="selectTime(this,'1:00 PM')">1:00 PM</div>
      <div class="choice" onclick="selectTime(this,'4:00 PM')">4:00 PM</div>
    </div>

    <div class="actions">
      <button type="submit" class="btn">Request showing</button>
    </div>

    <div class="note">
      Next step: after request, you can continue to application from the main menu or application page.
    </div>

  </form>

</div>

<div id="cabinet">
  <button id="cabinetClose" type="button" onclick="toggleCabinet()">✕</button>
  <h3>Menu</h3>
  <a href="index.html">Home</a>
  <a href="rental/index.html">Rental</a>
  <a href="showing.html">Showing</a>
  <a href="apply.html">Application</a>
  <a href="owner/add-property.html">Owner</a>
</div>

<script>
let selectedDay = "";
let selectedTime = "";
let cabinetOpen = false;

function selectDay(el, day){
  selectedDay = day;
  document.getElementById("selectedDayInput").value = day;
  document.querySelectorAll("#days .choice").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

function selectTime(el, time){
  selectedTime = time;
  document.getElementById("selectedTimeInput").value = time;
  document.querySelectorAll("#times .choice").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

function beforeSubmitShowing(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name){
    alert("Please enter your full name.");
    return false;
  }

  if(!phone && !email){
    alert("Please enter a phone number or email.");
    return false;
  }

  if(!selectedDay || !selectedTime){
    alert("Please select a day and time.");
    return false;
  }

  return true;
}

function toggleCabinet(){
  const c = document.getElementById("cabinet");
  cabinetOpen = !cabinetOpen;
  c.style.right = cabinetOpen ? "0" : "-280px";
}
</script>

</body>
</html>
