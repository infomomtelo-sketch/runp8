<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Start Application</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  position:relative;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.menu-btn{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:#2563eb;
}

.page-title{
  margin:10px 0 20px;
  font-size:32px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.label{
  font-size:14px;
  font-weight:700;
  margin:14px 0 8px;
}

.field{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  margin-bottom:10px;
  box-sizing:border-box;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
  font-size:15px;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  background:#eef4ff;
  color:#1d4ed8;
  border:1px solid #dbe4ee;
}

.note{
  margin-top:10px;
  color:#6b7280;
  font-size:13px;
  line-height:1.5;
}

/* overlay */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.18);
  backdrop-filter:blur(2px);
  display:none;
  z-index:999;
}

/* cabinet */
#cabinet{
  position:fixed;
  top:0;
  right:-300px;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-12px 0 40px rgba(0,0,0,0.2);
  padding:22px;
  transition:0.3s ease;
  z-index:1000;
  border-top-left-radius:18px;
  border-bottom-left-radius:18px;
  box-sizing:border-box;
}

#cabinet h3{
  margin:0 0 18px 0;
  font-size:22px;
}

#cabinet a{
  display:block;
  margin-bottom:14px;
  text-decoration:none;
  color:#142133;
  font-weight:600;
}

#cabinet hr{
  margin:18px 0;
  border:none;
  border-top:1px solid #e5e7eb;
}

.close-btn{
  margin-bottom:16px;
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
}

@media (max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }

  .actions{
    flex-direction:column;
  }

  .page-title{
    font-size:28px;
  }

  #cabinet{
    width:280px;
    right:-280px;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="top">
    <a href="showing.html" class="back">← Back</a>
    <div>RunP8</div>
    <button type="button" class="menu-btn" onclick="toggleCabinet()">☰</button>
  </div>

  <h1 class="page-title">Start application</h1>

  <form action="https://formspree.io/f/xreynqkp" method="POST" class="card" onsubmit="return beforeSubmitApplication()">

    <div class="label">Your details</div>
    <input name="name" id="name" class="field" placeholder="Full name" autocomplete="name" required>

    <div class="grid">
      <input name="email" id="email" class="field" placeholder="Email" autocomplete="email">
      <input name="phone" id="phone" class="field" placeholder="Phone" autocomplete="tel">
    </div>

    <div class="label">Move-in date</div>
    <input name="movein" id="movein" class="field" type="date" autocomplete="off" required>

    <div class="label">Monthly income</div>
    <input name="income" id="income" class="field" placeholder="Monthly income" autocomplete="off" required>

    <div class="label">Notes</div>
    <textarea name="notes" id="notes" class="field" style="min-height:100px;" placeholder="Optional notes"></textarea>

    <input type="hidden" name="form_type" value="rental_application">

    <div class="actions">
      <button type="button" class="btn btn-secondary" onclick="window.location.href='showing.html'">Back</button>
      <button type="submit" class="btn btn-primary">Submit application</button>
    </div>

    <div class="note">
      Next step: review, verification, and follow-up.
    </div>

  </form>

</div>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleCabinet()"></div>

<!-- CABINET -->
<div id="cabinet">
  <button type="button" onclick="toggleCabinet()" class="close-btn">✕</button>

  <h3>Menu</h3>

  <a href="index.html">Home</a>
  <a href="rental/index.html">Rental</a>
  <a href="showing.html">Showing</a>
  <a href="apply.html">Application</a>
  <a href="owner/add-property.html">Owner</a>

  <hr>

  <a href="apply.html">Pay rent</a>
  <a href="apply.html">Documents</a>
  <a href="showing.html">Messages</a>
  <a href="index.html">Settings</a>
</div>

<script>
let cabinetOpen = false;

function beforeSubmitApplication(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const movein = document.getElementById("movein").value.trim();
  const income = document.getElementById("income").value.trim();

  if(!name){
    alert("Please enter your full name.");
    return false;
  }

  if(!email && !phone){
    alert("Please enter an email or phone number.");
    return false;
  }

  if(!movein){
    alert("Please enter your move-in date.");
    return false;
  }

  if(!income){
    alert("Please enter your monthly income.");
    return false;
  }

  return true;
}

function toggleCabinet(){
  const c = document.getElementById("cabinet");
  const o = document.getElementById("overlay");

  cabinetOpen = !cabinetOpen;

  if(cabinetOpen){
    c.style.right = "0";
    o.style.display = "block";
    document.body.style.overflow = "hidden";
  } else {
    c.style.right = window.innerWidth <= 700 ? "-280px" : "-300px";
    o.style.display = "none";
    document.body.style.overflow = "auto";
  }
}
</script>

</body>
</html>
