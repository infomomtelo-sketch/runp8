<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Start Application</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.page-title{
  margin:10px 0 20px;
  font-size:32px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.label{
  font-size:14px;
  font-weight:700;
  margin:14px 0 8px;
}

.field{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  background:#eef4ff;
  color:#1d4ed8;
  border:1px solid #dbe4ee;
}

.confirm{
  display:none;
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:#eefbf2;
  border:1px solid #b7e2c3;
  color:#17603a;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <a href="showing.html" class="back">← Back</a>
    <div>RunP8</div>
  </div>

  <h1 class="page-title">Start application</h1>

  <div class="card">

    <div class="label">Your details</div>
    <input id="name" class="field" placeholder="Full name">
    
    <div class="grid">
      <input id="email" class="field" placeholder="Email">
      <input id="phone" class="field" placeholder="Phone">
    </div>

    <div class="label">Move-in</div>
    <input id="movein" class="field" placeholder="Move-in date">

    <div class="label">Income</div>
    <input id="income" class="field" placeholder="Monthly income">

    <div class="label">Notes</div>
    <textarea id="notes" class="field" style="min-height:100px;" placeholder="Optional notes"></textarea>

    <div class="actions">
      <button type="button" class="btn btn-secondary" onclick="goBack()">Back</button>
      <button type="button" class="btn btn-primary" onclick="submitApp()">Submit</button>
    </div>

    <div id="confirmBox" class="confirm"></div>

  </div>

</div>

<script>

function goBack(){
  window.location.href = "showing.html";
}

function submitApp(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const movein = document.getElementById("movein").value.trim();
  const income = document.getElementById("income").value.trim();
  const box = document.getElementById("confirmBox");

  if(!name){
    alert("Enter your name");
    return;
  }

  if(!email && !phone){
    alert("Enter email or phone");
    return;
  }

  if(!movein){
    alert("Enter move-in date");
    return;
  }

  if(!income){
    alert("Enter income");
    return;
  }

  box.style.display = "block";

  box.innerHTML = `
    Application submitted.<br><br>
    <strong>${name}</strong><br>
    Move-in: ${movein}<br><br>
    Next step: wait for review.
  `;
}

</script>

</body>
</html>
