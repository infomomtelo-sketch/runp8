<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Add Property</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:800px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  position:relative;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.menu-btn{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:#2563eb;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.title{
  font-size:28px;
  margin-bottom:16px;
}

.field{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  margin-bottom:12px;
  box-sizing:border-box;
  font-size:14px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:15px;
}

.note{
  margin-top:12px;
  color:#6b7280;
  font-size:13px;
  line-height:1.5;
}

.preview{
  width:100%;
  border-radius:14px;
  margin-top:10px;
  display:none;
  border:1px solid #dbe4ee;
}

/* overlay */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.18);
  backdrop-filter:blur(2px);
  display:none;
  z-index:999;
}

/* cabinet */
#cabinet{
  position:fixed;
  top:0;
  right:-300px;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-12px 0 40px rgba(0,0,0,0.2);
  padding:22px;
  transition:0.3s ease;
  z-index:1000;
  border-top-left-radius:18px;
  border-bottom-left-radius:18px;
  box-sizing:border-box;
}

#cabinet h3{
  margin:0 0 18px 0;
  font-size:22px;
}

#cabinet a{
  display:block;
  margin-bottom:14px;
  text-decoration:none;
  color:#142133;
  font-weight:600;
}

#cabinet hr{
  margin:18px 0;
  border:none;
  border-top:1px solid #e5e7eb;
}

.close-btn{
  margin-bottom:16px;
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
}

@media (max-width:700px){
  #cabinet{
    width:280px;
    right:-280px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <a href="../index.html" class="back">← Back</a>
    <div>RunP8</div>
    <button type="button" class="menu-btn" onclick="toggleCabinet()">☰</button>
  </div>

  <form action="https://formspree.io/f/xreynqkp" method="POST" class="card">

    <div class="title">List your property</div>

    <input name="owner_name" class="field" placeholder="Your name" required>
    <input name="email" class="field" placeholder="Email" required>

    <input name="title" class="field" placeholder="Property title" required>
    <input name="price" class="field" placeholder="Monthly rent" required>
    <input name="location" class="field" placeholder="Location / city" required>

    <textarea name="description" class="field" placeholder="Property description"></textarea>

    <input name="image" id="image" class="field" placeholder="Image URL (optional)">
    <div style="font-size:12px;color:#6b7280;margin-top:-4px;margin-bottom:8px;">
      Paste a public image link.
    </div>

    <img id="preview" class="preview" alt="Property preview">

    <input type="hidden" name="form_type" value="owner_listing">

    <button type="submit" class="btn">Submit property</button>

    <div class="note">
      Next step: review submission, then publish or follow up.
    </div>

  </form>

</div>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleCabinet()"></div>

<!-- CABINET -->
<div id="cabinet">
  <button type="button" onclick="toggleCabinet()" class="close-btn">✕</button>

  <h3>Menu</h3>

  <a href="../index.html">Home</a>
  <a href="../rental/index.html">Rental</a>
  <a href="../showing.html">Showing</a>
  <a href="../apply.html">Application</a>
  <a href="../owner/add-property.html">Owner</a>

  <hr>

  <a href="../apply.html">Pay rent</a>
  <a href="../apply.html">Documents</a>
  <a href="../showing.html">Messages</a>
  <a href="../index.html">Settings</a>
</div>

<script>
let cabinetOpen = false;

function toggleCabinet(){
  const c = document.getElementById("cabinet");
  const o = document.getElementById("overlay");

  cabinetOpen = !cabinetOpen;

  if(cabinetOpen){
    c.style.right = "0";
    o.style.display = "block";
    document.body.style.overflow = "hidden";
  } else {
    c.style.right = window.innerWidth <= 700 ? "-280px" : "-300px";
    o.style.display = "none";
    document.body.style.overflow = "auto";
  }
}

const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");

imageInput.addEventListener("input", () => {
  const url = imageInput.value.trim();

  if(url){
    preview.src = url;
    preview.style.display = "block";
  } else {
    preview.src = "";
    preview.style.display = "none";
  }
});
</script>

</body>
</html>
