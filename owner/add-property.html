<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Add Property</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:800px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.menu-btn{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.title{
  font-size:28px;
  margin-bottom:16px;
}

.field{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* cabinet */
#cabinet{
  position:fixed;
  top:0;
  right:-280px;
  width:280px;
  height:100%;
  background:white;
  box-shadow:-4px 0 20px rgba(0,0,0,0.12);
  padding:20px;
  transition:0.3s;
  z-index:999;
}

#cabinet a{
  display:block;
  padding:10px 0;
  text-decoration:none;
  color:#142133;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <a href="../index.html" class="back">← Back</a>
    <div>RunP8</div>
    <button onclick="toggleCabinet()" class="menu-btn">☰</button>
  </div>

  <form action="https://formspree.io/f/xreynqkp" method="POST" enctype="multipart/form-data" class="card">

    <div class="title">List your property</div>

    <input name="owner_name" class="field" placeholder="Your name" required>
    <input name="email" class="field" placeholder="Email" required>

    <input name="title" class="field" placeholder="Property title" required>
    <input name="price" class="field" placeholder="Monthly rent" required>
    <input name="location" class="field" placeholder="Location / city" required>

    <textarea name="description" class="field" placeholder="Property description"></textarea>

    <input type="file" name="image" class="field">

    <input type="hidden" name="form_type" value="owner_listing">

    <button type="submit" class="btn">Submit property</button>

  </form>

</div>

<div id="cabinet">
  <button onclick="toggleCabinet()">✕</button>
  <h3>Menu</h3>
  <a href="../index.html">Home</a>
  <a href="../rental/index.html">Rental</a>
  <a href="../showing.html">Showing</a>
  <a href="../apply.html">Application</a>
</div>

<script>
let open = false;

function toggleCabinet(){
  const c = document.getElementById("cabinet");
  open = !open;
  c.style.right = open ? "0" : "-280px";
}
</script>

</body>
</html>
