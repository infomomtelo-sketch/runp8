<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Add Property</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.page-title{
  margin:10px 0 20px;
  font-size:32px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.label{
  font-size:14px;
  font-weight:700;
  margin:14px 0 8px;
}

.field{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  margin-bottom:10px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.choice-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.choice-btn{
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  background:#f8fbff;
  cursor:pointer;
  font-weight:600;
}

.choice-btn.active{
  background:#2563eb;
  color:white;
  border-color:#2563eb;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  background:#eef4ff;
  color:#1d4ed8;
  border:1px solid #dbe4ee;
}

.confirm{
  display:none;
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:#eefbf2;
  border:1px solid #b7e2c3;
  color:#17603a;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <a href="../index.html" class="back">← Back</a>
    <div>RunP8</div>
  </div>

  <h1 class="page-title">List your property</h1>

  <div class="card">

    <div class="label">Property address</div>
    <input id="address" class="field" placeholder="Street address">
    <input id="city" class="field" placeholder="City">

    <div class="label">Property type</div>
    <div class="choice-grid" id="typeGrid">
      <button type="button" class="choice-btn">House</button>
      <button type="button" class="choice-btn">Apartment</button>
      <button type="button" class="choice-btn">Studio</button>
      <button type="button" class="choice-btn">Room</button>
      <button type="button" class="choice-btn">ADU</button>
      <button type="button" class="choice-btn">Other</button>
    </div>

    <div class="label">Details</div>
    <div class="grid">
      <input id="beds" class="field" placeholder="Bedrooms">
      <input id="baths" class="field" placeholder="Bathrooms">
    </div>

    <div class="grid">
      <input id="rent" class="field" placeholder="Monthly rent">
      <input id="available" class="field" placeholder="Available date">
    </div>

    <div class="label">Description</div>
    <textarea id="desc" class="field" style="min-height:100px;" placeholder="Describe the property"></textarea>

    <div class="actions">
      <button type="button" class="btn btn-secondary" onclick="goBack()">Back</button>
      <button type="button" class="btn btn-primary" onclick="submitListing()">Continue</button>
    </div>

    <div id="confirmBox" class="confirm"></div>

  </div>

</div>

<script>

let selectedType = "";

// Select property type
document.querySelectorAll('#typeGrid .choice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#typeGrid .choice-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.textContent.trim();
  });
});

// Back button
function goBack(){
  window.location.href = "../index.html";
}

// Submit
function submitListing(){

  const address = document.getElementById('address').value.trim();
  const city = document.getElementById('city').value.trim();

  const confirmBox = document.getElementById('confirmBox');

  if(!address || !city){
    alert("Please enter address and city.");
    return;
  }

  if(!selectedType){
    alert("Please select property type.");
    return;
  }

  confirmBox.style.display = "block";

  confirmBox.innerHTML = `
    Listing saved.<br><br>
    <strong>${selectedType}</strong><br>
    ${address}, ${city}<br><br>
    Next step: add photos or continue later.
  `;

}

</script>

</body>
</html>
