<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Owner</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.back{
  text-decoration:none;
  color:#2563eb;
  font-weight:600;
}

.page-title{
  margin:10px 0 20px;
  font-size:32px;
  line-height:1.1;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.label{
  font-size:14px;
  font-weight:700;
  margin:14px 0 8px;
}

.field{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  font-size:14px;
  margin-bottom:10px;
  box-sizing:border-box;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.choice-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}

.choice-btn{
  padding:12px;
  border-radius:12px;
  border:1px solid #dbe4ee;
  background:#f8fbff;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
}

.choice-btn.active{
  background:#2563eb;
  color:white;
  border-color:#2563eb;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  background:#eef4ff;
  color:#1d4ed8;
  border:1px solid #dbe4ee;
}

.confirm{
  display:none;
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:#eefbf2;
  border:1px solid #b7e2c3;
  color:#17603a;
  font-size:14px;
  line-height:1.5;
}

.note{
  margin-top:10px;
  color:#6b7280;
  font-size:13px;
}

@media (max-width:700px){
  .grid,
  .choice-grid{
    grid-template-columns:1fr;
  }

  .actions{
    flex-direction:column;
  }

  .page-title{
    font-size:28px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <a href="../index.html" class="back">← Back to home</a>
    <div>RunP8</div>
  </div>

  <h1 class="page-title">List your property</h1>

  <div class="card">
    <div class="label">Property address</div>
    <input class="field" id="address" type="text" placeholder="Street address" />
    <input class="field" id="city" type="text" placeholder="City" />

    <div class="label">Property type</div>
    <div class="choice-grid" id="typeGrid">
      <button class="choice-btn">House</button>
      <button class="choice-btn">Apartment</button>
      <button class="choice-btn">Studio</button>
      <button class="choice-btn">ADU</button>
      <button class="choice-btn">Room</button>
      <button class="choice-btn">Other</button>
    </div>

    <div class="label">Property details</div>
    <div class="grid">
      <input class="field" id="beds" type="text" placeholder="Bedrooms" />
      <input class="field" id="baths" type="text" placeholder="Bathrooms" />
    </div>

    <div class="grid">
      <input class="field" id="rent" type="text" placeholder="Monthly rent" />
      <input class="field" id="available" type="text" placeholder="Available date" />
    </div>

    <div class="label">Short description</div>
    <textarea class="field" id="desc" placeholder="Describe the property" style="min-height:110px;"></textarea>

    <div class="actions">
      <button class="btn btn-secondary" onclick="window.location.href='../index.html'">Back</button>
      <button class="btn btn-primary" onclick="submitListing()">Continue</button>
    </div>

    <div class="confirm" id="confirmBox"></div>

    <div class="note">
      Next step: after this, you can add photos, review details, or continue to publish later.
    </div>
  </div>
</div>

<script>
let selectedType = "";

document.querySelectorAll('#typeGrid .choice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#typeGrid .choice-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.textContent.trim();
  });
});

function submitListing(){
  const address = document.getElementById('address').value.trim();
  const city = document.getElementById('city').value.trim();
  const beds = document.getElementById('beds').value.trim();
  const baths = document.getElementById('baths').value.trim();
  const rent = document.getElementById('rent').value.trim();
  const available = document.getElementById('available').value.trim();
  const confirmBox = document.getElementById('confirmBox');

  if(!address || !city){
    alert("Please enter the property address and city.");
    return;
  }

  if(!selectedType){
    alert("Please select a property type.");
    return;
  }

  confirmBox.style.display = "block";
  confirmBox.innerHTML = `
    Listing details saved.<br><br>
    <strong>${selectedType}</strong><br>
    ${address}, ${city}<br>
    ${beds || "-"} bed · ${baths || "-"} bath<br>
    ${rent || "Rent not entered"}<br>
    ${available || "Available date not entered"}<br><br>
    Next step: add photos or continue later.
  `;

  setTimeout(() => {
    confirmBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 100);
}
</script>

</body>
</html>
