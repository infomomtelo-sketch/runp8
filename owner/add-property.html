<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Add Property | RunP8</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f6f8fb;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>Add your property</h2>

  <input id="name" placeholder="Property name" />
  <input id="price" placeholder="Price (e.g. 1200)" />
  <input id="location" placeholder="City (e.g. Fresno)" />
  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="submit()">Submit</button>
</div>

<script>
function submit() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const location = document.getElementById("location").value;
  const desc = document.getElementById("desc").value;

  const subject = `New Listing - ${name}`;
  const body = `
Property: ${name}
Price: $${price}
Location: ${location}
Description: ${desc}
`;

  window.location.href =
    "mailto:infomomtelo@gmail.com?subject=" +
    encodeURIComponent(subject) +
    "&body=" +
    encodeURIComponent(body);
}
</script>

</body>
</html>
