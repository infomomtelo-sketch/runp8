<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 Rentals</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1120;
  color:white;
}

/* HEADER */
.topbar{
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  background:#1f2937;
}

.card-body{
  padding:16px;
}

.price{
  font-size:22px;
  font-weight:bold;
}

.title{
  font-size:20px;
  margin-top:6px;
}

.meta{
  color:#cbd5e1;
  font-size:14px;
  margin:6px 0;
}

.desc{
  font-size:14px;
  color:#e5e7eb;
  margin-bottom:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>RunP8</h2>
  <a href="/owner/add-property.html" style="color:#60a5fa;">Add Property</a>
</div>

<div class="container">
  <h3>Available properties:</h3>

  <div id="grid" class="grid"></div>
</div>

<script>

function getListings(){
  return JSON.parse(localStorage.getItem("runp8_listings") || "[]");
}

function selectProperty(listing){
  localStorage.setItem("runp8_selected_property", JSON.stringify(listing));
  window.location.href = "/showing.html";
}

function render(){
  const grid = document.getElementById("grid");
  const listings = getListings();

  if(!listings.length){
    grid.innerHTML = "<p>No listings yet</p>";
    return;
  }

  grid.innerHTML = listings.map(l => {
    const img = l.photos && l.photos[0] ? l.photos[0] : "";

    return `
      <div class="card">

        ${img ? `<img src="${img}" />` : `<div style="height:200px;background:#1f2937;"></div>`}

        <div class="card-body">
          <div class="price">${l.price}</div>
          <div class="title">${l.title}</div>
          <div class="meta">${l.address}</div>
          <div class="desc">${l.description || ""}</div>

          <button onclick='selectProperty(${JSON.stringify(l)})'>
            Request Showing
          </button>
        </div>

      </div>
    `;
  }).join("");
}

render();

</script>

</body>
</html>
