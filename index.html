<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RunP8 | Rentals made clear</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  color:#142133;
}

/* HEADER */
.header{
  padding:18px;
  background:white;
  display:flex;
  align-items:center;
  gap:12px;
  position:relative;
}

.logo{
  width:42px;
  height:42px;
  background:#2563eb;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-weight:700;
}

/* NAV */
.nav{
  display:flex;
  gap:20px;
  padding:12px 18px;
  background:white;
  border-bottom:1px solid #e5e7eb;
}

.nav a{
  text-decoration:none;
  color:#142133;
  font-weight:600;
}

/* HERO */
.hero{
  padding:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  margin-bottom:20px;
}

.title{
  font-size:26px;
  font-weight:700;
  margin-bottom:10px;
}

/* BUTTONS */
.quick{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.quick a{
  text-decoration:none;
}

.btn{
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
  text-align:center;
}

.primary{
  background:#2563eb;
  color:white;
}

.secondary{
  background:#f1f5f9;
  color:#142133;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
  display:none;
  z-index:998;
}

/* CABINET */
#cabinet{
  position:fixed;
  top:0;
  right:-280px;
  width:280px;
  height:100%;
  background:white;
  box-shadow:-8px 0 30px rgba(0,0,0,0.15);
  padding:20px;
  transition:0.3s ease;
  z-index:999;
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
  box-sizing:border-box;
}

#cabinet a{
  display:block;
  margin-bottom:14px;
  text-decoration:none;
  color:#142133;
  font-weight:600;
}

#cabinet hr{
  margin:18px 0;
  border:none;
  border-top:1px solid #e5e7eb;
}

.close-btn{
  margin-bottom:16px;
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">P8</div>

  <div>
    <div style="font-weight:700;">RunP8</div>
    <div style="font-size:13px;color:#6b7280;">
      Rentals, listings, applications, and support
    </div>
  </div>

  <button onclick="toggleCabinet()" style="
    position:absolute;
    right:16px;
    top:16px;
    font-size:20px;
    background:none;
    border:none;
    cursor:pointer;
  ">☰</button>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="rental/index.html">Rental</a>
  <a href="owner/add-property.html">Owner</a>
  <a href="showing.html">Showing</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="card">
    <div class="title">What do you need?</div>

    <div class="quick">
      <a href="rental/index.html"><div class="btn primary">Find a rental</div></a>
      <a href="showing.html"><div class="btn secondary">Schedule showing</div></a>
      <a href="apply.html"><div class="btn secondary">Start application</div></a>
      <a href="owner/add-property.html"><div class="btn secondary">Owner tools</div></a>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleCabinet()"></div>

<!-- CABINET -->
<div id="cabinet">
  <button onclick="toggleCabinet()" class="close-btn">✕</button>

  <h3>Menu</h3>

  <a href="index.html">Home</a>
  <a href="rental/index.html">Rental</a>
  <a href="showing.html">Showing</a>
  <a href="apply.html">Application</a>
  <a href="owner/add-property.html">Owner</a>

  <hr>

  <a href="#">Pay rent</a>
  <a href="#">Documents</a>
  <a href="#">Messages</a>
  <a href="#">Settings</a>
</div>

<!-- SCRIPT -->
<script>
let cabinetOpen = false;

function toggleCabinet(){
  const c = document.getElementById("cabinet");
  const o = document.getElementById("overlay");

  cabinetOpen = !cabinetOpen;
  c.style.right = cabinetOpen ? "0" : "-280px";
  o.style.display = cabinetOpen ? "block" : "none";
}
</script>

</body>
</html>
