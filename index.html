<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RunP8 Chat</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f3f5f9;
      color:#0f172a;
    }

    .app{
      max-width:520px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background:#f3f5f9;
    }

    .topbar{
      padding:18px 16px 10px;
      background:#f3f5f9;
      border-bottom:1px solid #e5e7eb;
      position:sticky;
      top:0;
      z-index:10;
    }

    .brand{
      font-size:22px;
      font-weight:700;
      margin:0;
    }

    .sub{
      margin:4px 0 0;
      font-size:14px;
      color:#6b7280;
    }

    .chat-wrap{
      flex:1;
      padding:18px 14px 110px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .bubble{
      max-width:85%;
      padding:14px 16px;
      border-radius:18px;
      line-height:1.45;
      font-size:16px;
      word-wrap:break-word;
    }

    .bubble.bot{
      background:#ffffff;
      color:#0f172a;
      border:1px solid #e5e7eb;
      align-self:flex-start;
      border-bottom-left-radius:6px;
    }

    .bubble.user{
      background:#2563eb;
      color:#ffffff;
      align-self:flex-end;
      border-bottom-right-radius:6px;
    }

    .quick-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:4px;
    }

    .quick-btn{
      border:none;
      background:#ffffff;
      border:1px solid #dbe2ea;
      color:#0f172a;
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      cursor:pointer;
    }

    .composer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#ffffff;
      border-top:1px solid #e5e7eb;
      padding:12px;
    }

    .composer-inner{
      max-width:520px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .input{
      flex:1;
      border:1px solid #dbe2ea;
      border-radius:999px;
      padding:14px 16px;
      font-size:16px;
      outline:none;
    }

    .send-btn{
      border:none;
      background:#2563eb;
      color:#ffffff;
      border-radius:999px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1 class="brand">RunP8</h1>
      <p class="sub">Helping you find a place, simply</p>
    </div>

    <a href="/owner/add-property.html" class="btn">
  List your property
   </a>
    <div class="chat-wrap" id="chatWrap">
      <div class="bubble bot" id="starterMessage">
        Hi. Tell me what kind of rental you’re looking for.
      </div>

      <div class="quick-actions">
        <button class="quick-btn" onclick="addUserMessage('I want to schedule a showing.')">Schedule showing</button>
        <button class="quick-btn" onclick="addUserMessage('Can you tell me more about this place?')">More details</button>
        <button class="quick-btn" onclick="addUserMessage('What do I need to apply?')">Application help</button>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <input id="chatInput" class="input" type="text" placeholder="Type a message..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const property = params.get("property");
    const price = params.get("price");
    const location = params.get("location");

    const starterMessage = document.getElementById("starterMessage");
    const chatWrap = document.getElementById("chatWrap");
    const chatInput = document.getElementById("chatInput");

    if (property) {
      starterMessage.textContent =
        "Hi, I’m interested in the " + property +
        (location ? " in " + location : "") +
        (price ? " for $" + price : "") +
        ".";
    }

    function addUserMessage(text) {
      const msg = document.createElement("div");
      msg.className = "bubble user";
      msg.textContent = text;
      chatWrap.appendChild(msg);
      chatWrap.scrollTop = chatWrap.scrollHeight;
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      addUserMessage(text);
      chatInput.value = "";
    }

    chatInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
